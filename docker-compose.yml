name: flowcare

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowcare
      POSTGRES_PASSWORD: flowcare
      POSTGRES_DB: flowcare
    # Schema is owned by Alembic migrations (see the `migrate` service), not by
    # an init script — db/schema.sql is kept only as a human-readable reference.
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowcare"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # One-shot: apply Alembic migrations, then exit. Everything else waits on it.
  migrate:
    build: ./backend
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://flowcare:flowcare@db:5432/flowcare
    depends_on:
      db: {condition: service_healthy}

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://flowcare:flowcare@db:5432/flowcare
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info -Q default,ingest,workflows
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://flowcare:flowcare@db:5432/flowcare
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      db: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
      redis: {condition: service_healthy}

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
