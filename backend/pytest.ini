[pytest]
testpaths = tests
addopts = -q
# Silence known-benign third-party teardown noise so real signals stand out.
# - Starlette TestClient httpx deprecation (library-internal)
# - anyio MemoryObjectSendStream.__del__ during GC after the suite finishes
filterwarnings =
    ignore::DeprecationWarning:starlette.testclient
    ignore::pytest.PytestUnraisableExceptionWarning
