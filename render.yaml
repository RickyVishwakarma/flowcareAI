# Render blueprint — deploy the FlowCare AI backend + Postgres in one click.
# https://render.com/docs/blueprint-spec
#
# This deploys a SINGLE backend web service that processes referrals
# synchronously (Celery in eager mode), so no separate Redis/worker/S3 is
# needed for a live demo. Migrations run via preDeployCommand. The frontend is
# deployed separately on Vercel (see docs/DEPLOYMENT.md).

databases:
  - name: flowcare-db
    plan: free
    databaseName: flowcare
    user: flowcare

services:
  - type: web
    name: flowcare-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    # Apply Alembic migrations before each deploy goes live.
    preDeployCommand: alembic upgrade head
    # Bind to the port Render provides.
    dockerCommand: sh -c "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: flowcare-db
          property: connectionString
      # Eager processing → no broker/worker/redis required.
      - key: CELERY_BROKER_URL
        value: memory://
      - key: CELERY_RESULT_BACKEND
        value: cache+memory://
      - key: STORAGE_BACKEND
        value: local
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: FIRST_ADMIN_EMAIL
        value: admin@flowcare.ai
      # Set these in the Render dashboard after creating the service:
      - key: ANTHROPIC_API_KEY      # optional — blank = deterministic template extractor
        sync: false
      - key: FIRST_ADMIN_PASSWORD   # change from the default!
        sync: false
      - key: CORS_ORIGINS           # your Vercel URL, e.g. https://flowcare.vercel.app
        sync: false
      - key: FRONTEND_BASE_URL      # same Vercel URL (for email links)
        sync: false
