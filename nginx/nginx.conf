# Reverse proxy: terminate client traffic, route to API and frontend.
upstream flowcare_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # Generous body size for scanned-PDF/fax uploads.
    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://flowcare_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://flowcare_api/health;
    }

    location /metrics {
        # Restrict to the monitoring network in production.
        proxy_pass http://flowcare_api/metrics;
    }
}
